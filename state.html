<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>State – Trail For Wanderers</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --saffron: #E8611A; --deep: #1A1209; --cream: #FAF5EC;
      --gold: #C9922A; --green: #2D5A27; --terracotta: #C4502A;
      --muted: #7A6A55; --border: #DDD4C0;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--deep); overflow-x: hidden; }

    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 60px;
      background: rgba(250,245,236,0.95); backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo { font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 900; color: var(--deep); text-decoration: none; }
    .nav-logo span { color: var(--saffron); }
    .nav-back { font-size: 0.82rem; color: var(--muted); text-decoration: none; letter-spacing: 0.05em; transition: color 0.2s; }
    .nav-back:hover { color: var(--saffron); }

    /* HERO BANNER */
    .state-hero {
      margin-top: 60px; padding: 80px 60px 60px;
      background: var(--deep); color: var(--cream); position: relative; overflow: hidden;
    }
    .state-hero-bg {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 70% 80% at 100% 50%, rgba(232,97,26,0.2) 0%, transparent 60%),
                  radial-gradient(ellipse 50% 60% at 0% 50%, rgba(201,146,42,0.12) 0%, transparent 60%);
    }
    .state-hero-content { position: relative; max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 40px; }
    .state-eyebrow { font-size: 0.72rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); margin-bottom: 12px; }
    .state-title { font-family: 'Playfair Display', serif; font-size: clamp(2.8rem, 6vw, 5rem); font-weight: 900; line-height: 1.0; }
    .state-title em { color: var(--saffron); font-style: italic; }
    .state-tagline { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; font-style: italic; color: rgba(250,245,236,0.65); margin-top: 12px; max-width: 500px; }
    .state-meta { display: flex; gap: 28px; margin-top: 28px; flex-wrap: wrap; }
    .state-meta-item { font-size: 0.8rem; color: rgba(250,245,236,0.55); }
    .state-meta-item strong { color: var(--cream); display: block; font-size: 1rem; font-family: 'Playfair Display', serif; margin-bottom: 2px; }

    /* WEATHER CARD */
    .weather-card {
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px; padding: 28px 32px; min-width: 240px;
    }
    .weather-temp { font-family: 'Playfair Display', serif; font-size: 3.5rem; font-weight: 700; color: var(--saffron); line-height: 1; }
    .weather-desc { font-size: 0.85rem; color: rgba(250,245,236,0.6); margin-top: 6px; }
    .weather-details { display: flex; gap: 20px; margin-top: 16px; }
    .weather-detail { font-size: 0.78rem; color: rgba(250,245,236,0.5); }
    .weather-detail strong { color: rgba(250,245,236,0.85); display: block; }

    /* MAIN LAYOUT */
    .main { max-width: 1200px; margin: 0 auto; padding: 60px; }

    .section-label {
      font-size: 0.7rem; font-weight: 500; letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--saffron); margin-bottom: 28px; display: flex; align-items: center; gap: 12px;
    }
    .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* BEST TIME */
    .best-time-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 60px; }
    .season-card { background: white; border: 1px solid var(--border); border-radius: 4px; padding: 20px 18px; }
    .season-name { font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 700; margin-bottom: 4px; }
    .season-months { font-size: 0.75rem; color: var(--saffron); font-weight: 500; margin-bottom: 8px; }
    .season-desc { font-size: 0.8rem; color: var(--muted); line-height: 1.5; }
    .season-badge { display: inline-block; padding: 3px 10px; border-radius: 2px; font-size: 0.68rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px; }
    .badge-best { background: rgba(45,90,39,0.1); color: var(--green); }
    .badge-ok { background: rgba(201,146,42,0.1); color: var(--gold); }
    .badge-avoid { background: rgba(196,80,42,0.1); color: var(--terracotta); }

    /* GALLERY */
    .gallery-section { margin-bottom: 60px; }
    .gallery-grid { display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: 200px 200px; gap: 12px; }
    .gallery-item { border-radius: 4px; overflow: hidden; cursor: pointer; position: relative; }
    .gallery-item:first-child { grid-column: span 2; grid-row: span 2; }
    .gallery-color {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Playfair Display', serif; font-size: 0.95rem; font-weight: 700;
      color: rgba(255,255,255,0.85); text-align: center; padding: 20px;
      transition: transform 0.3s; position: relative; overflow: hidden;
    }
    .gallery-item:hover .gallery-color { transform: scale(1.04); }
    .gallery-color::after { content: ''; position: absolute; inset: 0; background: rgba(0,0,0,0.15); }
    .gallery-color span { position: relative; z-index: 1; }

    /* SLIDER controls */
    .gallery-nav { display: flex; gap: 10px; margin-top: 14px; justify-content: center; }
    .gallery-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); cursor: pointer; transition: background 0.2s; }
    .gallery-dot.active { background: var(--saffron); }

    /* PLACES */
    .places-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-bottom: 60px; }
    .place-card { background: white; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; transition: box-shadow 0.25s, transform 0.25s; }
    .place-card:hover { box-shadow: 0 12px 40px rgba(232,97,26,0.1); transform: translateY(-4px); }
    .place-color { height: 140px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; }
    .place-body { padding: 20px; }
    .place-name { font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 700; margin-bottom: 6px; }
    .place-type { font-size: 0.7rem; color: var(--saffron); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; }
    .place-desc { font-size: 0.82rem; color: var(--muted); line-height: 1.6; }
    .place-tip { margin-top: 10px; font-size: 0.78rem; color: var(--green); background: rgba(45,90,39,0.06); padding: 8px 12px; border-radius: 3px; }

    /* FOOD */
    .food-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; margin-bottom: 60px; }
    .food-card { background: white; border: 1px solid var(--border); border-radius: 4px; padding: 20px; text-align: center; transition: box-shadow 0.2s; }
    .food-card:hover { box-shadow: 0 8px 24px rgba(232,97,26,0.08); }
    .food-emoji { font-size: 2.5rem; margin-bottom: 10px; }
    .food-name { font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 700; margin-bottom: 4px; }
    .food-desc { font-size: 0.78rem; color: var(--muted); line-height: 1.5; }
    .food-type { font-size: 0.68rem; color: var(--saffron); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 8px; }

    /* HOTELS */
    .hotels-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-bottom: 60px; }
    .hotel-card { background: white; border: 1px solid var(--border); border-radius: 4px; padding: 24px; transition: box-shadow 0.2s; }
    .hotel-card:hover { box-shadow: 0 8px 28px rgba(232,97,26,0.1); }
    .hotel-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
    .hotel-name { font-family: 'Playfair Display', serif; font-size: 1.05rem; font-weight: 700; }
    .hotel-rating { display: flex; align-items: center; gap: 4px; font-size: 0.85rem; font-weight: 600; color: var(--gold); }
    .hotel-category { font-size: 0.7rem; color: var(--saffron); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; }
    .hotel-price { font-size: 0.88rem; color: var(--green); font-weight: 600; margin-bottom: 8px; }
    .hotel-desc { font-size: 0.8rem; color: var(--muted); line-height: 1.5; }
    .hotel-amenities { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 12px; }
    .amenity { font-size: 0.68rem; padding: 3px 9px; background: var(--cream); border: 1px solid var(--border); border-radius: 2px; color: var(--muted); }

    /* CHATBOT */
    .chatbot-section { margin-bottom: 80px; }
    .chatbot-wrap {
      background: white; border: 1px solid var(--border); border-radius: 8px; overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.06);
    }
    .chatbot-header {
      background: var(--deep); padding: 20px 28px;
      display: flex; align-items: center; gap: 14px;
    }
    .chatbot-avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, var(--saffron), var(--gold)); display: flex; align-items: center; justify-content: center; font-size: 1.1rem; }
    .chatbot-title { font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 700; color: var(--cream); }
    .chatbot-subtitle { font-size: 0.72rem; color: rgba(250,245,236,0.5); }
    .chatbot-online { width: 8px; height: 8px; border-radius: 50%; background: #4CAF50; margin-left: auto; box-shadow: 0 0 8px rgba(76,175,80,0.6); }

    .chatbot-messages {
      height: 380px; overflow-y: auto; padding: 24px 28px;
      display: flex; flex-direction: column; gap: 16px;
      scroll-behavior: smooth;
    }
    .chatbot-messages::-webkit-scrollbar { width: 4px; }
    .chatbot-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .msg { display: flex; gap: 10px; max-width: 82%; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg-avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; flex-shrink: 0; margin-top: 2px; }
    .bot-avatar { background: linear-gradient(135deg, var(--saffron), var(--gold)); color: white; }
    .user-avatar { background: var(--deep); color: var(--cream); }
    .msg-bubble { padding: 12px 16px; border-radius: 12px; font-size: 0.86rem; line-height: 1.6; }
    .msg.bot .msg-bubble { background: var(--cream); border: 1px solid var(--border); color: var(--deep); border-bottom-left-radius: 4px; }
    .msg.user .msg-bubble { background: var(--saffron); color: white; border-bottom-right-radius: 4px; }
    .msg-time { font-size: 0.68rem; color: var(--muted); margin-top: 4px; display: block; }

    .chatbot-suggestions { padding: 12px 28px; display: flex; gap: 8px; flex-wrap: wrap; border-top: 1px solid var(--border); background: rgba(250,245,236,0.5); }
    .suggestion { font-size: 0.75rem; padding: 6px 14px; border: 1px solid var(--border); border-radius: 20px; cursor: pointer; background: white; color: var(--deep); transition: all 0.2s; white-space: nowrap; }
    .suggestion:hover { border-color: var(--saffron); color: var(--saffron); background: rgba(232,97,26,0.04); }

    .chatbot-input-wrap { display: flex; gap: 0; border-top: 1px solid var(--border); }
    .chatbot-input { flex: 1; padding: 16px 20px; border: none; outline: none; font-family: 'DM Sans', sans-serif; font-size: 0.88rem; background: white; }
    .chatbot-send { padding: 16px 24px; background: var(--saffron); border: none; color: white; cursor: pointer; font-size: 1rem; transition: background 0.2s; }
    .chatbot-send:hover { background: var(--terracotta); }

    .typing { display: flex; gap: 4px; align-items: center; padding: 8px 0; }
    .typing span { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); animation: bounce 1.4s infinite; }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

    .breadcrumb { font-size: 0.78rem; color: var(--muted); margin-bottom: 40px; }
    .breadcrumb a { color: var(--saffron); text-decoration: none; }
    .breadcrumb a:hover { text-decoration: underline; }

    @media (max-width: 768px) {
      nav { padding: 14px 20px; }
      .state-hero { padding: 70px 20px 40px; }
      .main { padding: 40px 20px; }
      .best-time-grid { grid-template-columns: 1fr 1fr; }
      .gallery-grid { grid-template-columns: 1fr 1fr; grid-template-rows: auto; }
      .gallery-item:first-child { grid-column: span 2; }
    }
  </style>
</head>

        <div class="state-meta-item"><strong>${data.bestTime.find(b=>b.badge==='best')?.months || 'Oct–Feb'}</strong>Best Season</div>
      </div>
    </div>
    <div class="weather-card">
      <div style="font-size:0.7rem;letter-spacing:0.15em;text-transform:uppercase;color:rgba(250,245,236,0.4);margin-bottom:8px;">Current Weather</div>
      <div class="weather-temp">${data.weather.temp}</div>
      <div class="weather-desc">${data.weather.desc}</div>
      <div class="weather-details">
        <div class="weather-detail"><strong>${data.weather.humidity}</strong>Humidity</div>
        <div class="weather-detail"><strong>${data.weather.wind}</strong>Wind</div>
        <div class="weather-detail"><strong>${data.weather.feel}</strong>Feels Like</div>
      </div>
    </div>
  </div>
</div>`;

// ══════════════════════════════════════════
// RENDER MAIN CONTENT
// ══════════════════════════════════════════
const main = document.getElementById('mainContent');
const colors = getColors(Object.keys(stateData).indexOf(slug));

main.innerHTML = `
  <div class="breadcrumb"><a href="index.html">Home</a> → <a href="index.html#states">States</a> → ${data.name}</div>

  <!-- BEST TIME -->
  <p class="section-label">Best Time to Visit</p>
  <div class="best-time-grid">
    ${data.bestTime.map(s => `
      <div class="season-card">
        <span class="season-badge badge-${s.badge}">${s.badge === 'best' ? '✓ Ideal' : s.badge === 'avoid' ? '✗ Avoid' : '~ Okay'}</span>
        <div class="season-name">${s.season}</div>
        <div class="season-months">${s.months}</div>
        <div class="season-desc">${s.desc}</div>
      </div>
    `).join('')}
  </div>

  <!-- GALLERY -->
  <div class="gallery-section">
    <p class="section-label">Photo Gallery</p>
    <div class="gallery-grid">
      ${data.gallery.map((g, i) => `
        <div class="gallery-item">
          <div class="gallery-color" style="background:${g.color};">
            <span>${g.label}</span>
          </div>
        </div>
      `).join('')}
    </div>
  </div>

  <!-- FAMOUS PLACES -->
  <p class="section-label">Famous Places</p>
  <div class="places-grid">
    ${data.places.map((p, i) => `
      <div class="place-card">
        <div class="place-color" style="background:${colors[i % colors.length]}20; font-size:2.5rem; height:100px; display:flex; align-items:center; justify-content:center; border-bottom:1px solid var(--border);">
          ${p.emoji}
        </div>
        <div class="place-body">
          <div class="place-type">${p.type}</div>
          <div class="place-name">${p.name}</div>
          <div class="place-desc">${p.desc}</div>
          <div class="place-tip">💡 ${p.tip}</div>
        </div>
      </div>
    `).join('')}
  </div>

  <!-- FOOD -->
  <p class="section-label">Famous Food & Cuisine</p>
  <div class="food-grid">
    ${data.food.map(f => `
      <div class="food-card">
        <div class="food-emoji">${f.emoji}</div>
        <div class="food-name">${f.name}</div>
        <div class="food-desc">${f.desc}</div>
        <div class="food-type">${f.type}</div>
      </div>
    `).join('')}
  </div>

  <!-- HOTELS -->
  <p class="section-label">Hotel Recommendations</p>
  <div class="hotels-grid">
    ${data.hotels.map(h => `
      <div class="hotel-card">
        <div class="hotel-header">
          <div class="hotel-name">${h.name}</div>
          <div class="hotel-rating">⭐ ${h.rating}</div>
        </div>
        <div class="hotel-category">${h.category}</div>
        <div class="hotel-price">${h.price}</div>
        <div class="hotel-desc">${h.desc}</div>
        <div class="hotel-amenities">${h.amenities.map(a => `<span class="amenity">${a}</span>`).join('')}</div>
      </div>
    `).join('')}
  </div>

  <!-- CHATBOT -->
  <div class="chatbot-section">
    <p class="section-label">Ask Your Tour Guide</p>
    <div class="chatbot-wrap">
      <div class="chatbot-header">
        <div class="chatbot-avatar">🧭</div>
        <div>
          <div class="chatbot-title">TrailBot — ${data.name} Guide</div>
          <div class="chatbot-subtitle">Your personal tour guide for ${data.name}</div>
        </div>
        <div class="chatbot-online"></div>
      </div>
      <div class="chatbot-messages" id="chatMessages">
        <div class="msg bot">
          <div class="msg-avatar bot-avatar">🧭</div>
          <div>
            <div class="msg-bubble">
              Namaste! 🙏 Welcome to ${data.name} — <em>${data.tagline}</em>! I'm your personal tour guide here. You can ask me about the best time to visit, famous places, local food, hotels, transport, or the culture of this incredible state!
            </div>
            <span class="msg-time">Just now</span>
          </div>
        </div>
      </div>
      <div class="chatbot-suggestions" id="chatSuggestions">
        <button class="suggestion" onclick="sendSuggestion('best time')">📅 Best time to visit</button>
        <button class="suggestion" onclick="sendSuggestion('places')">🏛️ Famous places</button>
        <button class="suggestion" onclick="sendSuggestion('food')">🍛 Local food</button>
        <button class="suggestion" onclick="sendSuggestion('hotels')">🏨 Hotels</button>
        <button class="suggestion" onclick="sendSuggestion('transport')">🚗 Getting around</button>
        <button class="suggestion" onclick="sendSuggestion('culture')">🎭 Culture & festivals</button>
      </div>
      <div class="chatbot-input-wrap">
        <input class="chatbot-input" id="chatInput" placeholder="Ask anything about ${data.name}…" />
        <button class="chatbot-send" onclick="sendMessage()">➤</button>
      </div>
    </div>
  </div>
`;

// ══════════════════════════════════════════
// CHATBOT LOGIC
// ══════════════════════════════════════════
const chatMessages = document.getElementById('chatMessages');
const chatInput = document.getElementById('chatInput');

chatInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });

function getTime() {
  return new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
}

function addMsg(role, text) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const avatar = role === 'bot' ? '🧭' : '✈️';
  div.innerHTML = `
    <div class="msg-avatar ${role}-avatar">${avatar}</div>
    <div>
      <div class="msg-bubble">${text}</div>
      <span class="msg-time">${getTime()}</span>
    </div>`;
  chatMessages.appendChild(div);
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'msg bot'; div.id = 'typingIndicator';
  div.innerHTML = `<div class="msg-avatar bot-avatar">🧭</div><div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  chatMessages.appendChild(div);
  chatMessages.scrollTop = chatMessages.scrollHeight;
  return div;
}

function getBotResponse(input) {
  const q = input.toLowerCase().trim();
  const responses = data.chatResponses;
  for (const [key, val] of Object.entries(responses)) {
    if (q.includes(key)) return val;
  }
  // Keyword catch-alls
  if (q.includes('visit') || q.includes('when') || q.includes('season')) return responses['best time'];
  if (q.includes('eat') || q.includes('drink') || q.includes('cuisine') || q.includes('dish')) return responses['food'];
  if (q.includes('see') || q.includes('attraction') || q.includes('monument') || q.includes('temple')) return responses['places'];
  if (q.includes('stay') || q.includes('sleep') || q.includes('accommodation') || q.includes('resort')) return responses['hotels'];
  if (q.includes('travel') || q.includes('bus') || q.includes('train') || q.includes('flight') || q.includes('get')) return responses['transport'] || `Getting around ${data.name} is easy! Major cities are well connected by rail and air. Hiring a local guide or driver is recommended for remote areas. 🚗`;
  if (q.includes('festival') || q.includes('dance') || q.includes('tradition') || q.includes('art')) return responses['culture'] || `${data.name} has a rich cultural heritage with unique festivals, dances, and art forms. Ask locals about upcoming events — they love sharing their traditions! 🎭`;
  return `That's a great question about ${data.name}! 🤔 I'm best at answering about the best time to visit, famous places, local food, hotels, or transport. Try asking one of those, or rephrase your question and I'll do my best to help! 🧭`;
}

function sendMessage() {
  const val = chatInput.value.trim();
  if (!val) return;
  addMsg('user', val);
  chatInput.value = '';
  const typing = showTyping();
  setTimeout(() => {
    typing.remove();
    addMsg('bot', getBotResponse(val));
  }, 900 + Math.random() * 600);
}

function sendSuggestion(text) {
  chatInput.value = text;
  sendMessage();
}
</script>
</body>
